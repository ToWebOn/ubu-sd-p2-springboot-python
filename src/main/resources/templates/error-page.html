<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<title>
		Atención - Aviso del Sistema
	</title>
</head>
<body style="background-color:#f8f9fa; font-family: Arial, sans-serif; text-align: center; padding: 50px;">

<h1 style="color:#dc3545;" th:text="${errorTitulo}">
	Error Genérico
</h1>

<div style="background-color: white; border: 1px solid #ccc; padding: 20px; display: inline-block; text-align:
eft; max-width: 600px;">
	<p style="font-size: 18px;" th:text="${errorMensaje}">
		Ocurrió un problema inesperado.
	</p>
	<hr>
	<h4>
		Detalle técnico (Solo administradores):
	</h4>
	<p style="color: #6c757d; font-family: monospace;" th:text="${detalle}">
		...detalle de la traza...
	</p>
</div>
<br>
<br>
<a th:href="@{/simulacion}">
	<button style="padding: 10px 20px;">
		Volver a intentar
	</button>
</a>

</body>
</html>
